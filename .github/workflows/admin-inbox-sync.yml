name: Admin Inbox Sync

on:
  schedule:
    # Every 10 minutes — keeps Zoho/Gmail cache fresh for /admin/inbox
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: admin-inbox-sync
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Sync admin mailboxes via production API
        run: |
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL}/api/cron/sync-inbox")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "Inbox sync failed with status $code"
            exit 1
          fi
        env:
          SITE_URL: https://protosweb.eu
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
