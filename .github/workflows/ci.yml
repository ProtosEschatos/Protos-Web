name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run check-env
      - run: npm run lint
      - run: npm run type-check
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://protosweb.eu' }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  supabase:
    name: Supabase
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive edge function
        run: |
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${KEEP_ALIVE_SECRET}" \
            "${SUPABASE_URL}/functions/v1/keep-alive")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "Supabase keep-alive failed with status $code"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          KEEP_ALIVE_SECRET: ${{ secrets.KEEP_ALIVE_SECRET }}

      - name: Verify Supabase REST API (anon key)
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning title=Missing secret::Add SUPABASE_ANON_KEY to GitHub repo secrets for full Supabase CI coverage."
            exit 0
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${SUPABASE_URL}/rest/v1/")
          code=$(echo "$response" | tail -n 1)
          if [ "$code" != "200" ]; then
            echo "::warning title=Supabase REST::Check failed with status $code — rotate SUPABASE_ANON_KEY in GitHub secrets if this persists."
            exit 0
          fi
          echo "Supabase REST API reachable"
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  cloudflare:
    name: Cloudflare DNS
    runs-on: ubuntu-latest
    steps:
      - name: Verify Cloudflare zone (read-only)
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ZONE_ID" ]; then
            echo "::notice title=Cloudflare skipped::Add CLOUDFLARE_API_TOKEN (Zone:Read) and CLOUDFLARE_ZONE_ID to GitHub secrets to show DNS health here."
            exit 0
          fi
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/zones/${CLOUDFLARE_ZONE_ID}")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "$body" | head -c 500
          if [ "$code" != "200" ]; then
            echo "::error title=Cloudflare API::Request failed with status $code — check CLOUDFLARE_API_TOKEN in GitHub secrets."
            exit 1
          fi
          status=$(echo "$body" | python3 -c "import json,sys; d=json.load(sys.stdin); print(d.get('result',{}).get('status','unknown'))" 2>/dev/null || echo "unknown")
          echo "Zone status: $status"
          if [ "$status" != "active" ]; then
            echo "Cloudflare zone is not active"
            exit 1
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
