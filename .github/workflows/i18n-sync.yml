name: i18n Sync

on:
  push:
    branches: [main]
    paths:
      - 'src/messages/hr.json'
      - 'src/messages/_legal/hr.json'
      - 'scripts/translate-i18n.mjs'
  workflow_dispatch:
    inputs:
      force:
        description: 'Retranslate all keys (ignore fingerprint)'
        type: boolean
        default: false
      locale:
        description: 'Only sync this locale (blank = all)'
        type: choice
        default: ''
        options:
          - ''
          - en
          - de
          - es
          - it
          - sr

permissions:
  contents: write

concurrency:
  group: i18n-sync
  cancel-in-progress: false

jobs:
  translate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Run i18n translator
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.force }}" = "true" ]; then FLAGS="$FLAGS --force"; fi
          if [ -n "${{ github.event.inputs.locale }}" ]; then FLAGS="$FLAGS --locale ${{ github.event.inputs.locale }}"; fi
          node scripts/translate-i18n.mjs $FLAGS
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}

      - name: Commit updated locales
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes to commit."
            exit 0
          fi
          git add src/messages
          git commit -m "chore(i18n): auto-sync locales from hr.json

Auto-generated by scripts/translate-i18n.mjs — DeepSeek Chat.
Trigger: ${{ github.event_name }} on ${{ github.sha }}."
          git push
