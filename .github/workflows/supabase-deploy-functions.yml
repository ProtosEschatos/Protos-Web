name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
  workflow_dispatch:

concurrency:
  group: supabase-deploy-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy all edge functions
        run: |
          # submit-form: DB webhook has no JWT; subscribe: called with anon key from Next.js API
          NO_JWT="submit-form subscribe donation-checkout stripe-webhook"
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            echo "Deploying $fn..."
            if echo "$NO_JWT" | grep -qw "$fn"; then
              supabase functions deploy "$fn" --no-verify-jwt --project-ref "$SUPABASE_PROJECT_REF"
            else
              supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"
            fi
          done
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
