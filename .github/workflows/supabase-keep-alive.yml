name: Supabase Keep-Alive

on:
  schedule:
    # Backup only — primary keep-alive is pg_cron every 2 min (see migration 20260715143000).
    # GitHub scheduled workflows run at most ~every 5+ min in practice, not every 2.
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: supabase-keep-alive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - name: Ping keep-alive edge function every 2 minutes (hourly backup window)
        run: |
          set -euo pipefail
          END=$(( $(date +%s) + 3300 ))
          while [ "$(date +%s)" -lt "$END" ]; do
            response=$(curl -sS -w "\n%{http_code}" \
              -H "Authorization: Bearer ${KEEP_ALIVE_SECRET}" \
              "${SUPABASE_URL}/functions/v1/keep-alive")
            body=$(echo "$response" | head -n -1)
            code=$(echo "$response" | tail -n 1)
            echo "$(date -u +%Y-%m-%dT%H:%M:%SZ) $body (HTTP $code)"
            if [ "$code" != "200" ]; then
              echo "Keep-alive failed with status $code"
              exit 1
            fi
            sleep 120
          done
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          KEEP_ALIVE_SECRET: ${{ secrets.KEEP_ALIVE_SECRET }}
