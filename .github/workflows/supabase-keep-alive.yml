name: Supabase Keep-Alive

on:
  schedule:
    # Every 10 minutes — keeps Supabase free-tier project active
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: supabase-keep-alive
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase keep-alive edge function
        run: |
          response=$(curl -sS -w "\n%{http_code}" \
            -H "Authorization: Bearer ${KEEP_ALIVE_SECRET}" \
            "${SUPABASE_URL}/functions/v1/keep-alive")
          body=$(echo "$response" | head -n -1)
          code=$(echo "$response" | tail -n 1)
          echo "$body"
          if [ "$code" != "200" ]; then
            echo "Keep-alive failed with status $code"
            exit 1
          fi
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          KEEP_ALIVE_SECRET: ${{ secrets.KEEP_ALIVE_SECRET }}
