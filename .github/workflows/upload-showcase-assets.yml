name: Upload Production Assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/**'
      - 'scripts/normalize-showcase-screenshots.mjs'
      - 'scripts/upload-production-assets.mjs'
      - 'scripts/upload-showcase-assets.mjs'
      - 'scripts/cleanup-showcase-assets.mjs'
      - 'supabase/migrations/*site_assets*'

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Pillow for JPEG normalization
        run: pip3 install --user Pillow

      - name: Normalize showcase JPEGs
        run: npm run normalize:showcase-screenshots

      - name: Remove obsolete assets from Supabase Storage
        run: npm run cleanup:showcase-assets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload all production assets to Supabase Storage CDN
        run: npm run upload:production-assets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
