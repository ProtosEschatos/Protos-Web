name: Upload Showcase Assets

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'public/showcase/**'
      - 'scripts/normalize-showcase-screenshots.mjs'
      - 'scripts/upload-showcase-assets.mjs'
      - 'scripts/cleanup-showcase-assets.mjs'

permissions:
  contents: read

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Pillow for JPEG normalization
        run: pip3 install --user Pillow

      - name: Normalize showcase JPEGs (PNG-as-JPG from Firefox → real JPEG)
        run: npm run normalize:showcase-screenshots

      - name: Remove obsolete showcase assets from Supabase Storage
        run: npm run cleanup:showcase-assets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

      - name: Upload showcase images to Supabase Storage
        run: npm run upload:showcase-assets
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
