      <stop offset="50%" stop-color="#d6ecff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#7ec8ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="1" y="1" width="62" height="62" rx="12" ry="12" fill="#050b18" stroke="#5cc8ff" stroke-width="1.5"/>

  <!-- I swirl trail -->
  <path d="M6 46 C12 36, 16 28, 22 20 S30 10, 30 18" fill="none" stroke="rgba(180,230,255,0.55)" stroke-width="1.4" stroke-linecap="round"/>
  <circle cx="10" cy="28" r="0.9" fill="#eaf8ff"/>
  <circle cx="18" cy="18" r="0.7" fill="#eaf8ff"/>
  <circle cx="24" cy="34" r="0.8" fill="#eaf8ff"/>
  <circle cx="14" cy="42" r="0.6" fill="#eaf8ff"/>

  <!-- Letter I -->
  <path d="M9 12 L17 12 L17 16 L14.6 16 L14.6 48 L17 48 L17 52 L9 52 L9 48 L11.4 48 L11.4 16 L9 16 Z" fill="url(#iGlow)"/>

  <!-- Apostrophe -->
  <path d="M24 14 C25.6 12.2, 28.4 12.4, 28.8 15 C29 17, 27.2 21.2, 25.8 24.2 C25.2 25.5, 23.8 25, 24 23.5 C24.6 20.5, 25.6 17.4, 24.8 15.6 C24.4 14.6, 23.8 14.2, 24 14 Z" fill="#eaf8ff"/>

  <!-- M light burst -->
  <g stroke="rgba(230,245,255,0.55)" stroke-linecap="round">
    <line x1="44" y1="32" x2="58" y2="32" stroke-width="1"/>
    <line x1="44" y1="32" x2="30" y2="32" stroke-width="0.7"/>
    <line x1="44" y1="32" x2="44" y2="18" stroke-width="0.7"/>
    <line x1="44" y1="32" x2="44" y2="46" stroke-width="0.7"/>
    <line x1="44" y1="32" x2="54" y2="22" stroke-width="0.55"/>
    <line x1="44" y1="32" x2="34" y2="22" stroke-width="0.55"/>
    <line x1="44" y1="32" x2="54" y2="42" stroke-width="0.55"/>
    <line x1="44" y1="32" x2="34" y2="42" stroke-width="0.55"/>
  </g>
  <circle cx="44" cy="32" r="10" fill="url(#burst)"/>

  <!-- Letter M -->
  <path d="M33 14 L37.2 14 L37.2 38 L42 22 L46 22 L50.8 38 L50.8 14 L55 14 L55 50 L49.4 50 L45.4 35 L41.4 50 L35.8 50 L33 50 Z" fill="url(#mMetal)"/>
