<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="I'M">
  <defs>
    <linearGradient id="iGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="45%" stop-color="#c8efff"/>
      <stop offset="100%" stop-color="#4ec8ff"/>
    </linearGradient>
    <linearGradient id="mMetal" x1="10%" y1="0%" x2="90%" y2="100%">
      <stop offset="0%" stop-color="#f7fbff"/>
      <stop offset="35%" stop-color="#c8d8ec"/>
      <stop offset="70%" stop-color="#8eafd2"/>
      <stop offset="100%" stop-color="#5f87b0"/>
