      <stop offset="0%" stop-color="#0a0f1f"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
    <radialGradient id="spot" cx="50%" cy="30%" r="45%">
      <stop offset="0%" stop-color="#ef4444" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0a0f1f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect x="48" y="48" width="704" height="504" rx="24" fill="#0f0f1f" stroke="#2a2a3f" stroke-width="2"/>
  <!-- Hood spot -->
  <ellipse cx="400" cy="260" rx="320" ry="140" fill="url(#spot)"/>
